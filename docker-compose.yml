services:
  ntfy:
    image: binwiederhier/ntfy:latest
    restart: unless-stopped
    command: serve
    ports:
      - "80:80"
    expose:
      - "80"
    volumes:
      - ntfy-cache:/var/cache/ntfy
      - ./server.yml:/etc/ntfy/server.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  ntfy-cache:
